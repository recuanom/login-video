<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acceso privado</title>
<style>
:root{
  --bg:#0f0f0f;
  --panel:#1c1c1c;
  --text:#fff;
  --accent:#1e88e5;
  --square-size:60px;
}

/* RESET Y ESTILOS GENERALES */
*{box-sizing:border-box;}
html,body{
  margin:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
  overflow:hidden;
}

.screen{
  display:none;
  height:100vh;
  width:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}

/* LOGIN */
#loginBox{display:flex;}
.container{
  background:var(--panel);
  padding:26px;
  border-radius:12px;
  box-shadow:0 6px 30px rgba(0,0,0,0.6);
  max-width:420px;
  width:90%;
  text-align:center;
}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
  font-size:16px;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:#fff;
  font-size:15px;
  cursor:pointer;
}

/* PUZZLE */
#puzzlePage{
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:10px;
}
#bgGrid{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:grid;
  z-index:0;
}
.square{width:100%;height:100%;}
.black{background:black;}
.white{background:white;}
.corner{
  position:absolute;
  width:var(--square-size);
  height:var(--square-size);
  background:black;
  z-index:20;
}
.top-left{top:0;left:0;}
.top-right{top:0;right:0;}
.bottom-left{bottom:0;left:0;}
.bottom-right{bottom:0;right:0;}
.images{
  display:flex;
  gap:20px;
  margin-top:10px;
  z-index:2;
}
.img-box{
  width:180px;
  height:180px;
  background:#ddd;
  border-radius:8px;
  display:flex;
  justify-content:center;
  align-items:center;
}
#rightImg svg{transform:rotate(30deg);}
#leftSVG{transition:transform .1s linear;}
.controls{
  margin-top:10px;
  z-index:2;
  text-align:center;
  max-width:400px;
  width:90%;
}

/* VIDEO TIPO INSTAGRAM */
#videoPage{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  background:black;
  overflow-y:auto;
  gap:15px;
  padding-top:20px;
}

#videoContainer{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  width:80%;
  max-width:400px;
}

#instaImg{
  width:200px;
  height:200px;
  border-radius:50%;
  border:5px solid #bc2a8d;
  object-fit:cover;
  cursor:pointer;
}

#mainVideo{
  display:none;
  width:100%;
  border-radius:14px;
  box-shadow:0 0 40px rgba(0,0,0,0.8);
  background:black;
}

/* BOTONES VIDEO */
.closeVideo{
  position:absolute;
  top:5px;
  right:5px;
  background:#22222200;
  color:#fff;
  font-weight:bold;
  font-size:16px;
  border:none;
  border-radius:50%;
  width:25px;
  height:25px;
  cursor:pointer;
  display:none;
  line-height:25px;
  text-align:center;
}
.loopVideo{
  position:absolute;
  top:5px;
  left:5px;
  background:#22222200;
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
  cursor:pointer;
  display:none; /* Oculto inicialmente */
  padding:2px;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:all 0.2s ease;
}
.loopVideo img{
  width:100%;
  height:100%;
  object-fit:contain;
}
/* Estado activo del loop */
.loopVideo.active{
  background:#444;
  box-shadow:0 0 8px #1e88e5;
}

/* DESPLEGABLE */
.dropdown{
  width:90%;
  max-width:400px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:40px;
}
.dropdown button.toggle{
  width:100%;
  background:#222;
  padding:12px;
  font-size:16px;
}
.dropdown-content{
  display:none;
  padding:15px;
  gap:10px;
  flex-direction:column;
}
.field{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1b1b1b;
  padding:10px;
  border-radius:8px;
  gap:10px;
}
.field span{
  word-break:break-all;
  font-size:14px;
}
.copy-btn{
  background:#444;
  padding:6px 10px;
  font-size:13px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="screen">
  <div class="container">
    <h2>Acceso privado</h2>
    <input id="user" placeholder="Usuario" autocomplete="off">
    <input id="pass" type="password" placeholder="Contraseña" autocomplete="new-password">
    <button id="btnEnter">Entrar</button>
  </div>
</div>

<!-- PUZZLE -->
<div id="puzzlePage" class="screen">
  <div id="bgGrid"></div>
  <div class="corner top-left"></div>
  <div class="corner top-right" id="cornerTR"></div>
  <div class="corner bottom-left" id="cornerBL"></div>
  <div class="corner bottom-right"></div>

  <h3 style="z-index:2">Verificación adicional requerida</h3>
  <div class="images">
    <div class="img-box">
      <svg viewBox="0 0 100 100">
        <g id="leftSVG">
          <rect x="20" y="20" width="60" height="60" fill="#1e88e5"/>
          <circle cx="50" cy="50" r="14" fill="#fff"/>
        </g>
      </svg>
    </div>
    <div id="rightImg" class="img-box">
      <svg viewBox="0 0 100 100">
        <rect x="20" y="20" width="60" height="60" fill="#1e88e5"/>
        <circle cx="50" cy="50" r="14" fill="#fff"/>
      </svg>
    </div>
  </div>
  <div class="controls">
    <label>Ángulo: <span id="angleLabel">0°</span></label>
    <input id="rotRange" type="range" min="0" max="359" value="0">
  </div>
</div>

<!-- VIDEO TIPO INSTAGRAM -->
<div id="videoPage" class="screen">
  <div id="videoContainer">
    <img id="instaImg" src="img.jpg" alt="Imagen Video">
    <video id="mainVideo" controls playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>
    <button class="closeVideo" id="closeVideo">X</button>
    <button class="loopVideo" id="loopVideoBtn"><img src="bucle.png" alt="Bucle"></button>
  </div>

  <div class="dropdown">
    <button class="toggle" id="toggleInfo">Mostrar información</button>
    <div class="dropdown-content" id="dropdownContent">
      <div class="field">
        <span id="emailText">recuanomuser@outlook.com</span>
        <button class="copy-btn" onclick="copyText('emailText',this)">Copiar</button>
      </div>
      <div class="field">
        <span id="userText">recuuseranom999</span>
        <button class="copy-btn" onclick="copyText('userText',this)">Copiar</button>
      </div>
    </div>
  </div>
</div>

<script>
const loginBox=document.getElementById("loginBox")
const puzzlePage=document.getElementById("puzzlePage")
const videoPage=document.getElementById("videoPage")

const user=document.getElementById("user")
const pass=document.getElementById("pass")
const btnEnter=document.getElementById("btnEnter")

const rotRange=document.getElementById("rotRange")
const leftSVG=document.getElementById("leftSVG")
const angleLabel=document.getElementById("angleLabel")

const cornerBL=document.getElementById("cornerBL")
const cornerTR=document.getElementById("cornerTR")

const bgGrid=document.getElementById("bgGrid")

const video=document.getElementById("mainVideo")
const instaImg=document.getElementById("instaImg")
const closeBtn=document.getElementById("closeVideo")
const loopBtn=document.getElementById("loopVideoBtn")

let secret=0

/* FONDO */
function generateGrid(){
  const size=60
  const cols=Math.ceil(window.innerWidth/size)
  const rows=Math.ceil(window.innerHeight/size)
  bgGrid.style.gridTemplateColumns=`repeat(${cols},1fr)`
  bgGrid.style.gridTemplateRows=`repeat(${rows},1fr)`
  bgGrid.innerHTML=""
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const div=document.createElement("div")
      div.className = ((x+y)%2==0)?"square black":"square white"
      bgGrid.appendChild(div)
    }
  }
}
generateGrid()
window.addEventListener("resize",generateGrid)

/* LOGIN */
function tryLogin(){
  const u=user.value.trim()
  const p=pass.value
  user.value=""
  pass.value=""
  if(u==="00si" && p===""){
    loginBox.style.display="none"
    puzzlePage.style.display="flex"
  }
}
btnEnter.onclick=tryLogin
user.addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin()})
pass.addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin()})

/* ROTACION */
rotRange.oninput=function(){
  leftSVG.setAttribute("transform","rotate("+this.value+" 50 50)")
  angleLabel.textContent=this.value+"°"
}

/* SECRETO */
cornerBL.onclick=function(){ if(secret===0)secret=1; else secret=0 }
cornerTR.onclick=function(){ 
  if(secret===1){ 
    puzzlePage.style.display='none'; 
    videoPage.style.display='flex'; 
    // Solo mostrar botones cuando se reproduce el video
    loopBtn.style.display='none';
    closeBtn.style.display='none';
  } 
  secret=0 
}

/* DESPLEGABLE */
const toggle=document.getElementById("toggleInfo")
const content=document.getElementById("dropdownContent")
toggle.onclick=function(){ content.style.display = content.style.display==="flex" ? "none" : "flex" }

/* COPIAR */
function copyText(id,btn){
  const text=document.getElementById(id).innerText
  navigator.clipboard.writeText(text)
  btn.innerText="Copiado"
  setTimeout(()=>{btn.innerText="Copiar"},2000)
}

/* INSTAGRAM VIDEO */
instaImg.onclick=function(){
  instaImg.style.display='none'
  video.style.display='block'
  closeBtn.style.display='block'
  loopBtn.style.display='flex' // Aparece solo ahora
  video.play()
}
closeBtn.onclick=function(){
  video.pause()
  video.currentTime=0
  video.style.display='none'
  closeBtn.style.display='none'
  loopBtn.style.display='none'
  loopBtn.classList.remove("active")
  video.loop=false
  instaImg.style.display='block'
}

/* LOOP VIDEO */
loopBtn.onclick=function(){
  video.loop = !video.loop
  loopBtn.classList.toggle("active", video.loop)
}
</script>
</body>
</html>
