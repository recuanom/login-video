<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acceso privado</title>
<style>
:root{
  --bg:#0f0f0f;
  --panel:#1c1c1c;
  --text:#fff;
  --accent:#1e88e5;
  --square-size:60px;
  --corner-touch:120px; /* tamaño área de toque en móviles */
  --gray-panel:#333;
}

*{box-sizing:border-box;}
html,body{
  margin:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
  overflow:hidden;
}

.screen{
  display:none;
  height:100vh;
  width:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}

/* LOGIN */
#loginBox{display:flex;}
.container{
  background:var(--panel);
  padding:26px;
  border-radius:12px;
  box-shadow:0 6px 30px rgba(0,0,0,0.6);
  max-width:420px;
  width:90%;
  text-align:center;
}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
  font-size:16px;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:#fff;
  font-size:15px;
  cursor:pointer;
}

/* PUZZLE */
#puzzlePage{
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:10px;
}
#bgGrid{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:grid;
  z-index:0;
  pointer-events:none; /* importante para que no bloquee las esquinas */
}
.square{width:100%;height:100%;}
.black{background:black;}
.white{background:white;}

/* Esquinas */
.corner{
  position:absolute;
  width:var(--square-size);
  height:var(--square-size);
  background:black;
  z-index:50; /* encima de todo */
}
.top-left{top:0;left:0;}
.top-right{top:0;right:0;}
.bottom-left{bottom:0;left:0;}
.bottom-right{bottom:0;right:0;}

/* Aumentar área de toque en móviles sin cambiar aspecto */
.corner.bottom-left::before{
  content:"";
  position:absolute;
  top:-30px;
  left:-30px;
  width:var(--corner-touch);
  height:var(--corner-touch);
}
.corner.top-right::before{
  content:"";
  position:absolute;
  top:-30px;
  left:-30px;
  width:var(--corner-touch);
  height:var(--corner-touch);
}

.images{
  display:flex;
  gap:20px;
  margin-top:10px;
  z-index:2;
  background:var(--gray-panel);
  padding:10px;
  border-radius:12px;
}
.img-box{
  width:180px;
  height:180px;
  background:#ddd;
  border-radius:8px;
  display:flex;
  justify-content:center;
  align-items:center;
}
#rightImg svg{transform:rotate(30deg);}
#leftSVG{transition:transform .1s linear;}
.controls{
  margin-top:10px;
  z-index:2;
  text-align:center;
  max-width:400px;
  width:90%;
  background:var(--gray-panel);
  padding:10px;
  border-radius:12px;
}
h3.puzzleTitle{
  z-index:2;
  background:var(--gray-panel);
  padding:10px 15px;
  border-radius:12px;
  margin-bottom:8px;
}
h4.puzzleSubtitle{
  z-index:2;
  background:var(--gray-panel);
  padding:8px 12px;
  border-radius:10px;
  margin-bottom:10px;
  font-weight:normal;
}
#errorText{
  color:red;
  margin-top:10px;
  font-weight:bold;
}
#attemptsCounter{
  margin-top:8px;
  font-weight:bold;
  color:#ff6b6b;
}

/* MOVIL */
@media (max-width:768px){
  .corner{
    width:80px;
    height:80px;
  }
  .corner.bottom-left::before,
  .corner.top-right::before{
    width:150px;
    height:150px;
  }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="screen">
  <div class="container">
    <h2>Acceso privado</h2>
    <input id="user" placeholder="Usuario" autocomplete="off">
    <input id="pass" type="password" placeholder="Contraseña" autocomplete="new-password">
    <button id="btnEnter">Entrar</button>
  </div>
</div>

<!-- PUZZLE -->
<div id="puzzlePage" class="screen">
  <div id="bgGrid"></div>
  <div class="corner top-left"></div>
  <div class="corner top-right" id="cornerTR"></div>
  <div class="corner bottom-left" id="cornerBL"></div>
  <div class="corner bottom-right"></div>

  <h3 class="puzzleTitle">Verificación adicional requerida</h3>
  <h4 class="puzzleSubtitle">Gira la figura para que coincida con la imagen de la derecha</h4>

  <div class="images">
    <div class="img-box">
      <svg viewBox="0 0 100 100">
        <g id="leftSVG">
          <rect x="20" y="20" width="60" height="60" fill="#1e88e5"/>
          <circle cx="50" cy="50" r="14" fill="#fff"/>
        </g>
      </svg>
    </div>
    <div id="rightImg" class="img-box">
      <svg viewBox="0 0 100 100">
        <rect x="20" y="20" width="60" height="60" fill="#1e88e5"/>
        <circle cx="50" cy="50" r="14" fill="#fff"/>
      </svg>
    </div>
  </div>
  <div class="controls">
    <label>Ángulo: <span id="angleLabel">0°</span></label>
    <input id="rotRange" type="range" min="0" max="359" value="0">
    <button id="btnResolve">Resolver</button>
    <div id="errorText"></div>
    <div id="attemptsCounter">Intentos restantes: 3</div>
  </div>
</div>

<script>
const loginBox=document.getElementById("loginBox")
const puzzlePage=document.getElementById("puzzlePage")
const videoPage=document.getElementById("videoPage")
const user=document.getElementById("user")
const pass=document.getElementById("pass")
const btnEnter=document.getElementById("btnEnter")
const rotRange=document.getElementById("rotRange")
const leftSVG=document.getElementById("leftSVG")
const angleLabel=document.getElementById("angleLabel")
const cornerBL=document.getElementById("cornerBL")
const cornerTR=document.getElementById("cornerTR")
const bgGrid=document.getElementById("bgGrid")
const btnResolve=document.getElementById("btnResolve")
const errorText=document.getElementById("errorText")
const attemptsCounter=document.getElementById("attemptsCounter")

let secret=0
let attemptsLeft=3

function generateGrid(){
  const size=60
  const cols=Math.ceil(window.innerWidth/size)
  const rows=Math.ceil(window.innerHeight/size)
  bgGrid.style.gridTemplateColumns=`repeat(${cols},1fr)`
  bgGrid.style.gridTemplateRows=`repeat(${rows},1fr)`
  bgGrid.innerHTML=""
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const div=document.createElement("div")
      div.className = ((x+y)%2==0)?"square black":"square white"
      bgGrid.appendChild(div)
    }
  }
}
generateGrid()
window.addEventListener("resize",generateGrid)

/* LOGIN */
function tryLogin(){
  const u=user.value.trim()
  const p=pass.value
  user.value=""
  pass.value=""
  if(u==="00si" && p===""){
    loginBox.style.display="none"
    puzzlePage.style.display="flex"
  }
}
btnEnter.onclick=tryLogin
user.addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin()})
pass.addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin()})

/* ROTACION */
rotRange.oninput=function(){
  leftSVG.setAttribute("transform","rotate("+this.value+" 50 50)")
  angleLabel.textContent=this.value+"°"
}

/* BOTON RESOLVER */
btnResolve.onclick=function(){
  if(attemptsLeft>0){
    errorText.textContent="Ángulo Incorrecto"
    attemptsLeft--
    attemptsCounter.textContent = "Intentos restantes: " + attemptsLeft
  }
  if(attemptsLeft<=0){
    location.reload()
  }
}

/* SECRETO */
cornerBL.onclick=function(){ if(secret===0)secret=1; else secret=0 }
cornerTR.onclick=function(){ if(secret===1){ alert("Se mostraría el video"); } secret=0 }
</script>
</body>
</html>
